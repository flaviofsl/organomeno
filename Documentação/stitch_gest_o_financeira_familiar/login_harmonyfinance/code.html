<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Organomeno</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#b4c5ff",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#eaf1ff",

                    "outline": "#76777d",
                    "on-primary-container": "#7c839b",
                    "inverse-primary": "#bec6e0",
                    "on-secondary-fixed-variant": "#003ea8",
                    "on-surface": "#0b1c30",
                    "primary-container": "#131b2e",
                    "on-tertiary": "#ffffff",
                    "secondary": "#0051d5",
                    "on-surface-variant": "#45464d",
                    "error": "#ba1a1a",
                    "surface": "#f8f9ff",
                    "secondary-container": "#316bf3",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#213145",
                    "on-error": "#ffffff",
                    "surface-tint": "#565e74",
                    "primary-fixed": "#dae2fd",
                    "primary": "#000000",
                    "on-primary-fixed-variant": "#3f465c",
                    "on-primary-fixed": "#131b2e",
                    "primary-fixed-dim": "#bec6e0",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#cbdbf5",

                    "gutter": "24px",
                    "xl": "64px",

                    "base": "8px"
            },
            "fontFamily": {

                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Manrope"],
                    "body-lg": ["Inter"],
                    "numeric-md": ["Inter"],
                    "display-lg": ["Manrope"],
                    "body-md": ["Inter"]

            "fontSize": {

                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-md">
<!-- Login Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-sm flex flex-col gap-md relative overflow-hidden">
<!-- Decorative Header Accent (Minimalist) -->
<div class="absolute top-0 left-0 w-full h-1 bg-secondary"></div>
<!-- Header -->
<header class="flex flex-col items-center text-center gap-base mb-sm">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-base text-secondary">
<span class="material-symbols-outlined text-[28px]" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Organomeno</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Acesse sua conta para continuar</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-[40px] pr-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember & Forgot Options -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-base cursor-pointer group">
<div class="relative flex items-center justify-center w-4 h-4 rounded border border-outline-variant bg-surface group-hover:border-secondary transition-colors">
<input class="peer absolute opacity-0 w-full h-full cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined text-[14px] text-surface-container-lowest opacity-0 peer-checked:opacity-100 bg-secondary w-full h-full rounded flex items-center justify-center transition-opacity" data-icon="check" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant">Lembrar de mim</span>
</label>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Esqueceu a senha?</a>
</div>
<!-- Submit Action -->
<button class="w-full bg-secondary text-on-secondary font-label-md text-label-md py-sm rounded-lg hover:bg-secondary-container transition-colors flex justify-center items-center gap-base mt-xs uppercase tracking-wider" type="button">
                Entrar
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-base">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-sm font-body-sm text-body-sm text-on-surface-variant">ou continue com</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-sm">
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md py-[10px] rounded-lg hover:bg-surface-container transition-colors uppercase tracking-wider" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md py-[10px] rounded-lg hover:bg-surface-container transition-colors uppercase tracking-wider" type="button">
<svg class="w-5 h-5 text-on-surface" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78.78-.04 1.94-.8 3.34-.69 1.14.04 2.33.48 3.14 1.48-2.67 1.54-2.19 4.99.38 5.92-.61 1.56-1.41 3.2-2.5 4.39l.56 1.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
                Apple
            </button>
</div>
<!-- Footer / Register Link -->
<div class="mt-base text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Não tem uma conta? 
                <a class="font-label-md text-label-md text-secondary hover:underline uppercase tracking-wider ml-xs" href="#">Cadastrar-se</a>
</p>
</div>
</main>
</body></html>
